name: Build WPF EXE

on:
  push:
    branches: ["**"]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore solution
        run: dotnet restore SafeScriptStudio.sln

      - name: Build WPF app (Release)
        run: dotnet build SafeScriptStudio/SafeScriptStudio.csproj -c Release --no-restore

      - name: Build terminal host (Release)
        run: dotnet build SafeTerminalHost/SafeTerminalHost.csproj -c Release --no-restore

      - name: Publish WPF app
        run: dotnet publish SafeScriptStudio/SafeScriptStudio.csproj -c Release -r win-x64 --self-contained true /p:PublishSingleFile=true /p:IncludeNativeLibrariesForSelfExtract=true -o publish

      - name: Publish terminal host
        run: dotnet publish SafeTerminalHost/SafeTerminalHost.csproj -c Release -r win-x64 --self-contained true /p:PublishSingleFile=true -o publish-terminal

      - name: Merge terminal host into app artifact
        run: copy publish-terminal\SafeTerminalHost.exe publish\SafeTerminalHost.exe

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: SafeScriptStudio-win-x64
          path: publish/
