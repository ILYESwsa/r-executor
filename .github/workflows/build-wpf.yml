name: Build WPF EXE

on:
  push:
    branches: ["**"]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore SafeScriptStudio/SafeScriptStudio.csproj

      - name: Build (Release)
        run: dotnet build SafeScriptStudio/SafeScriptStudio.csproj -c Release --no-restore

      - name: Publish self-contained exe
        run: dotnet publish SafeScriptStudio/SafeScriptStudio.csproj -c Release -r win-x64 --self-contained true /p:PublishSingleFile=true /p:IncludeNativeLibrariesForSelfExtract=true -o publish

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: SafeScriptStudio-win-x64
          path: publish/
